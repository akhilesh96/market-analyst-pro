spring.application.name=market-analyst-pro
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# --- KAFKA CONSUMER CONFIGURATION ---
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.group-id=ai-analyst-group
# Give the AI plenty of time to process without Kafka heartbeat timing out
spring.kafka.consumer.properties.max.poll.interval.ms=300000
spring.kafka.consumer.properties.session.timeout.ms=60000

# Prevent the consumer from fetching too much data at once
# This leaves more RAM for Ollama
spring.kafka.consumer.max-poll-records=10